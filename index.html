<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portfólio de Merchandising</title>
    <style>
        /* Estilo minimalista e moderno */
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-content { padding: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Seu Nome</h1>
        <p>Especialista em Merchandising & Visual Merchandising</p>
    </div>
    
    <div class="grid">
        <!-- Exemplo de Ponto Extra -->
        <div class="card">
            <img src="link-da-sua-foto.jpg" alt="Ilha Temática">
            <div class="card-content">
                <h3>Ilha Temática de Vinhos</h3>
                <p>Ação especial com foco em aumento de giro e exposição de marcas selecionadas.</p>
            </div>
        </div>
    </div>
</body>
</html>
